name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)

jobs:
  build:
    name: Build & Release for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mysql_tui_cli
            asset_name: mysql_tui_cli-linux-amd64
          - os: macos-latest
            artifact_name: mysql_tui_cli
            asset_name: mysql_tui_cli-macos-amd64
          - os: windows-latest
            artifact_name: mysql_tui_cli.exe
            asset_name: mysql_tui_cli-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary for upload
        shell: bash
        run: |
          mv target/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
